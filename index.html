<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shatla Care</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep:   #075e4e;
      --green-main:   #0b8571;
      --green-mid:    #0da688;
      --green-light:  #e6f4f1;
      --green-border: #b8ddd8;
      --green-soft:   #afd69d;
      --white:        #ffffff;
      --bg:           #f2f9f7;
      --text:         #0d2b25;
      --text-muted:   #4a7a70;
      --shadow:       0 2px 12px rgba(11,133,113,0.10);
      --radius:       14px;
      --radius-sm:    8px;
    }

    body {
      font-family: 'Noto Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loader ─────────────────────────────── */
    #loader {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; gap: 16px;
    }
    .loader-logo { width: 72px; height: 72px; object-fit: contain; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.7; transform:scale(0.94); } }
    #loader p { color: var(--text-muted); font-size: 14px; }

    /* ── Error ──────────────────────────────── */
    #error-screen {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; gap: 12px; padding: 24px; text-align: center;
    }
    #error-screen .err-icon { font-size: 48px; }
    #error-screen h2 { color: var(--green-deep); }
    #error-screen p { color: var(--text-muted); font-size: 14px; }

    /* ── App ────────────────────────────────── */
    #app { display: none; }

    /* ── Header ─────────────────────────────── */
    header {
      background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-main) 100%);
      color: white; padding: 24px 20px 28px;
      position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; top: -40px; left: -40px;
      width: 180px; height: 180px; border-radius: 50%;
      background: rgba(175,214,157,0.08);
    }
    header::after {
      content: ''; position: absolute; bottom: -60px; right: -20px;
      width: 220px; height: 220px; border-radius: 50%;
      background: rgba(175,214,157,0.06);
    }
    .header-brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; position: relative; z-index: 1;
    }
    .brand-logo { height: 38px; width: auto; object-fit: contain; filter: brightness(0) invert(1); }
    .brand-divider { width: 1px; height: 30px; background: rgba(255,255,255,0.3); }
    .brand-name { font-size: 15px; font-weight: 600; opacity: 0.9; }
    .brand-tagline { font-size: 11px; opacity: 0.6; margin-top: 1px; }

    .header-deal { position: relative; z-index: 1; }
    .deal-name { font-size: 24px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
    .deal-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .deal-badge {
      background: rgba(255,255,255,0.15); border-radius: 20px;
      padding: 4px 12px; font-size: 12px; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .deal-contact { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
    .contact-item { font-size: 13px; opacity: 0.8; display: flex; align-items: center; gap: 6px; }

    /* ── Stats bar ───────────────────────────── */
    .stats-bar {
      background: var(--white); border-bottom: 1px solid var(--green-border);
      display: flex; justify-content: space-around; padding: 14px 0;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--green-main); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* ── Section title ───────────────────────── */
    .section-title {
      padding: 20px 16px 8px; font-size: 13px;
      color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px;
    }

    /* ── Visit Card ──────────────────────────── */
    .visit-card {
      background: var(--white); margin: 0 12px 10px;
      border-radius: var(--radius); box-shadow: var(--shadow);
      overflow: hidden; border: 1px solid var(--green-border);
    }
    .visit-header {
      padding: 14px 16px; cursor: pointer;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .visit-header:active { background: var(--green-light); }
    .visit-info { flex: 1; min-width: 0; }
    .visit-date { font-size: 16px; font-weight: 700; color: var(--green-deep); }
    .visit-title { font-size: 13px; color: var(--text-muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .visit-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .chip {
      font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .chip-status-submitted { background: #e3f2fd; color: #1565c0; }
    .chip-status-approved  { background: #e8f5e9; color: #2e7d32; }
    .chip-status-done      { background: #e8f5e9; color: #2e7d32; }
    .chip-status-default   { background: #f5f5f5; color: #616161; }
    .chip-tag              { background: var(--green-light); color: var(--green-main); }
    .chip-urgent           { background: #fff3e0; color: #e65100; }
    .chip-pest             { background: #fce4ec; color: #c62828; }

    .visit-kpis { display: flex; gap: 14px; margin-top: 8px; }
    .kpi-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); }
    .kpi-icon { font-size: 13px; }

    .visit-photos-strip { display: flex; gap: 5px; margin-top: 10px; }
    .strip-photo {
      width: 52px; height: 52px; border-radius: 8px;
      object-fit: cover; background: var(--green-light);
      flex-shrink: 0;
    }
    .strip-more {
      width: 52px; height: 52px; border-radius: 8px;
      background: var(--green-main); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }

    .visit-toggle {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--green-light); display: flex; align-items: center; justify-content: center;
      color: var(--green-main); font-size: 14px; flex-shrink: 0;
      transition: transform 0.25s; margin-top: 2px;
    }
    .visit-card.open .visit-toggle { transform: rotate(180deg); }

    /* ── Visit body (expanded) ───────────────── */
    .visit-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease;
      border-top: 1px solid transparent;
    }
    .visit-card.open .visit-body {
      max-height: 4000px;
      border-top-color: var(--green-border);
    }
    .visit-body-inner { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* Report sections */
    .report-section { border-radius: var(--radius-sm); overflow: hidden; }
    .report-section-header {
      padding: 10px 14px; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 7px; letter-spacing: 0.3px;
    }
    .report-section-body { padding: 12px 14px; font-size: 13px; line-height: 1.8; }

    .sec-notes .report-section-header  { background: #dff0ed; color: var(--green-deep); }
    .sec-notes .report-section-body    { background: #f0faf8; color: var(--text); }
    .sec-tasks .report-section-header  { background: #d6f0e6; color: #075e4e; }
    .sec-tasks .report-section-body    { background: #f0faf5; color: var(--text); }
    .sec-recs  .report-section-header  { background: #d8efe8; color: var(--green-main); }
    .sec-recs  .report-section-body    { background: #edf8f5; color: var(--text); }

    /* Task items as checklist */
    .task-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
    .task-item::before {
      content: '✓'; color: var(--green-main); font-weight: 700;
      flex-shrink: 0; margin-top: 1px;
    }
    .task-item.missed::before { content: '✕'; color: #e53935; }

    /* Rec items */
    .rec-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
    .rec-item::before { content: '→'; color: #f57f17; font-weight: 700; flex-shrink: 0; margin-top: 1px; }

    /* Photo gallery */
    .photo-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .gallery-photo {
      aspect-ratio: 1; object-fit: cover; border-radius: 8px;
      width: 100%; cursor: pointer; background: var(--green-light);
      transition: opacity 0.15s;
    }
    .gallery-photo:active { opacity: 0.8; }
    .gallery-title {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
    }

    /* Visit details row */
    .detail-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .detail-item {
      flex: 1; min-width: 100px;
      background: var(--green-light); border-radius: var(--radius-sm);
      padding: 10px 12px;
    }
    .detail-item-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .detail-item-value { font-size: 15px; font-weight: 700; color: var(--green-deep); }

    /* ── Lightbox ─────────────────────────────── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    #lightbox-close {
      position: absolute; top: 16px; left: 16px;
      width: 36px; height: 36px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; color: white;
    }

    /* ── Footer ──────────────────────────────── */
    footer {
      text-align: center; padding: 24px 16px;
      font-size: 12px; color: var(--text-muted);
    }
    footer strong { color: var(--green-main); }

    /* ── Empty state ──────────────────────────── */
    .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── Report Teaser ───────────────────────── */
    .report-teaser {
      font-size: 12px; color: var(--text-muted); margin-top: 6px;
      line-height: 1.6; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .visit-card.open .report-teaser { display: none; }
    .read-more-cta {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; font-size: 12px; font-weight: 600;
      color: var(--green-main); cursor: pointer;
    }
    .visit-card.open .read-more-cta { display: none; }

    /* ── Date Filter ─────────────────────────── */
    .filter-bar {
      padding: 8px 12px 2px; display: flex; gap: 6px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-pill {
      flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--green-border); background: var(--white);
      color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .filter-pill.active {
      background: var(--green-main); color: white; border-color: var(--green-main);
    }
    .filter-pill:active { opacity: 0.75; }

    /* ── Feedback Section ────────────────────── */
    .feedback-section {
      border: 1.5px solid var(--green-border); border-radius: var(--radius-sm); overflow: hidden;
    }
    .feedback-toggle {
      width: 100%; padding: 11px 14px; background: var(--green-light);
      border: none; border-radius: 0; cursor: pointer; text-align: right;
      font-family: 'Noto Sans Arabic', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--green-deep); display: flex; align-items: center; justify-content: space-between;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .feedback-toggle:active { background: var(--green-border); }
    .feedback-toggle-icon { transition: transform 0.2s; font-style: normal; }
    .feedback-section.fb-open .feedback-toggle-icon { transform: rotate(180deg); }
    .feedback-form-wrap { display: none; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .feedback-section:not(.fb-open) .feedback-form-wrap { display: none; }
    .feedback-section.fb-open .feedback-form-wrap { display: flex; }

    .rating-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .rating-label { font-size: 13px; color: var(--text); flex: 1; min-width: 0; }
    .stars { display: flex; gap: 3px; direction: ltr; flex-shrink: 0; }
    .star {
      font-size: 24px; cursor: pointer; color: #d1d5db; line-height: 1;
      transition: color 0.1s; -webkit-tap-highlight-color: transparent;
      user-select: none; touch-action: manipulation;
    }
    .star.lit { color: #f59e0b; }
    .star:active { transform: scale(1.15); }

    .feedback-comment {
      width: 100%; border: 1.5px solid var(--green-border); border-radius: var(--radius-sm);
      padding: 10px 12px; font-family: 'Noto Sans Arabic', sans-serif;
      font-size: 13px; color: var(--text); resize: none; background: var(--bg);
      outline: none; min-height: 72px;
    }
    .feedback-comment:focus { border-color: var(--green-main); }

    .photo-upload-label {
      display: block; border: 2px dashed var(--green-border); border-radius: var(--radius-sm);
      padding: 14px; text-align: center; cursor: pointer;
      color: var(--text-muted); font-size: 13px; transition: border-color 0.15s;
    }
    .photo-upload-label.has-photo { border-color: var(--green-main); border-style: solid; }
    .photo-upload-label img { max-height: 100px; border-radius: 6px; display: block; margin: 0 auto 6px; }
    .photo-upload-label input { display: none; }

    .btn-feedback-submit {
      width: 100%; padding: 12px; border-radius: var(--radius-sm);
      background: var(--green-main); color: white; border: none;
      font-family: 'Noto Sans Arabic', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-feedback-submit:active { background: var(--green-deep); }
    .btn-feedback-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    .feedback-done {
      padding: 20px 14px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .feedback-done-icon { font-size: 36px; }
    .feedback-done p { font-size: 14px; font-weight: 700; color: var(--green-deep); }
    .feedback-done small { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <img class="loader-logo" src="/logo-shatla-sky.png" alt="Shatla Sky">
  <p>جاري تحميل بياناتك…</p>
</div>

<!-- Error -->
<div id="error-screen">
  <div class="err-icon">🌿</div>
  <h2>تعذّر تحميل البيانات</h2>
  <p id="error-msg">تحقق من الرابط وحاول مجدداً</p>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-brand">
      <img class="brand-logo" src="/logo-shatla-sky.png" alt="Shatla Sky">
      <div class="brand-divider"></div>
      <div>
        <div class="brand-name">Shatla Care</div>
        <div class="brand-tagline">بوابة العميل | Client Portal</div>
      </div>
    </div>
    <div class="header-deal">
      <div class="deal-name" id="deal-name"></div>
      <div class="deal-meta" id="deal-meta"></div>
      <div class="deal-contact" id="deal-contact"></div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-visits">—</div>
      <div class="stat-label">زيارة</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-last">—</div>
      <div class="stat-label">آخر زيارة</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-photos">—</div>
      <div class="stat-label">صورة</div>
    </div>
  </div>

  <div class="section-title">سجل الزيارات والتقارير</div>
  <div id="filter-bar" class="filter-bar"></div>
  <div id="visits-list"></div>

  <footer>
    <img src="/logo-shatla-sky.png" alt="Shatla Sky" style="height:22px;opacity:0.5;vertical-align:middle;margin-bottom:2px;"><br>
    <strong>Shatla Sky</strong> · Nurturing Communities · جميع البيانات سرية
  </footer>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
/* ══════════════════════════════
   Shatla Care — Client Portal
   ══════════════════════════════ */

function getDealId() {
  const hash = location.hash.replace('#', '');
  const params = new URLSearchParams(hash);
  return params.get('deal_id') || new URLSearchParams(location.search).get('deal_id');
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
}

function formatDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
}

function statusChipClass(s) {
  const sl = (s || '').toLowerCase();
  if (sl.includes('approved') || sl.includes('done')) return 'chip-status-approved';
  if (sl.includes('submitted') || sl.includes('report')) return 'chip-status-submitted';
  return 'chip-status-default';
}

function statusLabel(s) {
  const map = {
    'Report Submitted': 'تم الإرسال',
    'Report Sent':      'تم الإرسال',
    'Done': 'مكتملة',
    'Approved': 'معتمدة',
    'Pending': 'قيد المراجعة',
    'On Going': 'جارية'
  };
  return map[s] || s;
}

function tagChipClass(tag) {
  if (tag.toLowerCase().includes('urgent')) return 'chip-urgent';
  if (tag.toLowerCase().includes('pest') || tag.toLowerCase().includes('disease')) return 'chip-pest';
  return 'chip-tag';
}

/* Extract plain-text teaser from AI report */
function getReportTeaser(text, maxLen) {
  maxLen = maxLen || 110;
  if (!text) return '';
  var clean = text
    .replace(/(?:Technical Notes|الملاحظات الفنية|Tasks Done|المهام المنجزة|Recommendations[^:\n]*:|التوصيات[^:\n]*:)\s*/gi, '')
    .replace(/^[-–•*]\s*/gm, '')
    .replace(/\n+/g, ' ')
    .trim();
  if (clean.length <= maxLen) return clean;
  var cut = clean.slice(0, maxLen);
  var lastSpace = cut.lastIndexOf(' ');
  return (lastSpace > 60 ? cut.slice(0, lastSpace) : cut) + '…';
}

/* Parse AI report into 3 sections */
function parseReport(text) {
  if (!text) return { notes: '', tasks: [], recs: [] };

  const notesMatch = text.match(/(?:Technical Notes|الملاحظات الفنية)\s*:?\s*([\s\S]*?)(?=Tasks Done|المهام المنجزة|$)/i);
  const tasksMatch = text.match(/(?:Tasks Done|المهام المنجزة)\s*:?\s*([\s\S]*?)(?=Recommendations|التوصيات|$)/i);
  const recsMatch  = text.match(/(?:Recommendations.*?:|التوصيات.*?:)\s*([\s\S]*?)$/i);

  const notes = (notesMatch?.[1] || '').trim();

  const parseList = (raw) => {
    return (raw || '').trim().split('\n')
      .map(l => l.trim().replace(/^[-–•]\s*/, ''))
      .filter(Boolean);
  };

  return {
    notes,
    tasks: parseList(tasksMatch?.[1]),
    recs:  parseList(recsMatch?.[1])
  };
}

function buildReportHTML(aiReport) {
  if (!aiReport) return '<div class="empty"><div class="empty-icon">📋</div><p>لا يوجد تقرير بعد</p></div>';
  const { notes, tasks, recs } = parseReport(aiReport);
  let html = '';

  if (notes) {
    html += `<div class="report-section sec-notes">
      <div class="report-section-header">🔍 الملاحظات الفنية</div>
      <div class="report-section-body">${notes.replace(/\n/g, '<br>')}</div>
    </div>`;
  }

  if (tasks.length) {
    const items = tasks.map(t => {
      const isMissed = /skipped|missed|لم يتم|تأجيل/i.test(t);
      return `<div class="task-item${isMissed ? ' missed' : ''}">${t}</div>`;
    }).join('');
    html += `<div class="report-section sec-tasks">
      <div class="report-section-header">✅ المهام المنجزة</div>
      <div class="report-section-body">${items}</div>
    </div>`;
  }

  if (recs.length) {
    const items = recs.map(r => `<div class="rec-item">${r}</div>`).join('');
    html += `<div class="report-section sec-recs">
      <div class="report-section-header">💡 التوصيات والتعليمات</div>
      <div class="report-section-body">${items}</div>
    </div>`;
  }

  return html || '<p style="font-size:13px;color:var(--text-muted);">—</p>';
}

function buildVisitCard(visit, index) {
  const date = formatDate(visit.startTime || visit.submissionDate);
  const dateShort = formatDateShort(visit.submissionDate);
  const cleanTitle = (visit.title || 'زيارة صيانة').replace(/\s*\d{4}-\d{2}-\d{2}T[\d:.+]+\s*/g, '').trim();

  // chips: reported tags only (no internal status chip for clients)
  let chips = '';
  (visit.reportedStatus || []).forEach(tag => {
    const cl = tagChipClass(tag);
    chips += `<span class="chip ${cl}">${tag}</span>`;
  });

  // kpis
  let kpis = '';
  if (visit.spentTime) kpis += `<span class="kpi-item"><span class="kpi-icon">⏱</span>${visit.spentTime} ساعة</span>`;
  if (visit.bags) kpis += `<span class="kpi-item"><span class="kpi-icon">🗑</span>${visit.bags} شكاير</span>`;
  if (visit.photoCount) kpis += `<span class="kpi-item"><span class="kpi-icon">📷</span>${visit.photoCount} صورة</span>`;

  // photo strip (first 4)
  let strip = '';
  if (visit.photos && visit.photos.length) {
    const shown = visit.photos.slice(0, 3);
    const extra = visit.photos.length - shown.length;
    shown.forEach((url, i) => {
      strip += `<img class="strip-photo" src="${url}" alt="" loading="lazy" onerror="this.style.display='none'">`;
    });
    if (extra > 0) strip += `<div class="strip-more">+${extra}</div>`;
  }

  // visit detail row
  let details = '';
  if (visit.responsible) details += `<div class="detail-item"><div class="detail-item-label">المهندس المسؤول</div><div class="detail-item-value">${visit.responsible}</div></div>`;
  if (visit.submissionDate) details += `<div class="detail-item"><div class="detail-item-label">تاريخ التقرير</div><div class="detail-item-value">${dateShort}</div></div>`;
  if (visit.spentTime) details += `<div class="detail-item"><div class="detail-item-label">مدة الزيارة</div><div class="detail-item-value">${visit.spentTime}</div></div>`;
  if (visit.bags) details += `<div class="detail-item"><div class="detail-item-label">عدد الشكاير</div><div class="detail-item-value">${visit.bags}</div></div>`;

  // full photo gallery
  let gallery = '';
  if (visit.photos && visit.photos.length) {
    gallery = `<div>
      <div class="gallery-title">📷 صور الزيارة (${visit.photos.length})</div>
      <div class="photo-gallery">
        ${visit.photos.map((url, i) => `<img class="gallery-photo" src="${url}" alt="صورة ${i+1}" loading="lazy" onclick="openLightbox('${url}')" onerror="this.style.display='none'">`).join('')}
      </div>
    </div>`;
  }

  const reportHTML  = buildReportHTML(visit.aiReport);
  const teaser      = getReportTeaser(visit.aiReport);
  const feedbackHTML = buildFeedbackSection(visit, index);

  return `
  <div class="visit-card" id="vc-${index}">
    <div class="visit-header" onclick="toggleCard(${index})">
      <div class="visit-info">
        <div class="visit-date">${date}</div>
        <div class="visit-title">${cleanTitle}</div>
        <div class="visit-chips">${chips}</div>
        ${kpis ? `<div class="visit-kpis">${kpis}</div>` : ''}
        ${teaser ? `<div class="report-teaser">${teaser}</div>` : ''}
        ${teaser ? `<span class="read-more-cta">اقرأ التقرير الكامل ›</span>` : ''}
        ${strip ? `<div class="visit-photos-strip">${strip}</div>` : ''}
      </div>
      <div class="visit-toggle">▼</div>
    </div>
    <div class="visit-body">
      <div class="visit-body-inner">
        ${details ? `<div class="detail-row">${details}</div>` : ''}
        ${reportHTML}
        ${gallery}
        ${feedbackHTML}
      </div>
    </div>
  </div>`;
}

/* ── Feedback ──────────────────────────── */
var RATING_CATS = [
  { key: 'overall',        label: 'الرضا العام' },
  { key: 'communication',  label: 'التواصل' },
  { key: 'serviceQuality', label: 'جودة الخدمة' },
  { key: 'workCompletion', label: 'إتمام العمل' },
  { key: 'issueResolution',label: 'حل المشكلات' },
  { key: 'professionalism',label: 'الاحترافية' },
  { key: 'cleanliness',    label: 'نظافة الموقع' },
  { key: 'beforeAfter',    label: 'قبل وبعد' }
];

function buildFeedbackSection(visit, index) {
  var submitted = localStorage.getItem('fb_done_' + visit.id) === '1';

  if (visit.hasFeedback || submitted) {
    return `<div class="feedback-section">
      <div class="feedback-done">
        <div class="feedback-done-icon">✅</div>
        <p>شكراً على تقييمك!</p>
        <small>تقييمك يساعدنا على تحسين خدمتنا</small>
      </div>
    </div>`;
  }

  var rows = RATING_CATS.map(function(c) {
    var stars = [1,2,3,4,5].map(function(n) {
      return `<span class="star" data-idx="${index}" data-cat="${c.key}" data-val="${n}" onclick="rateStar(this)">★</span>`;
    }).join('');
    return `<div class="rating-row">
      <span class="rating-label">${c.label}</span>
      <div class="stars" id="stars_${index}_${c.key}">${stars}</div>
    </div>`;
  }).join('');

  return `<div class="feedback-section" id="fb_${index}">
    <button type="button" class="feedback-toggle" onclick="toggleFeedback(${index})">
      <span>⭐ قيّم هذه الزيارة</span>
      <i class="feedback-toggle-icon">▼</i>
    </button>
    <div class="feedback-form-wrap" id="fbform_${index}">
      ${rows}
      <textarea class="feedback-comment" id="fbcomment_${index}" placeholder="تعليقك (اختياري)…" rows="3" maxlength="500"></textarea>
      <label class="photo-upload-label" id="fblabel_${index}">
        <div id="fbphoto_preview_${index}">📷 أضف صورة (اختياري)</div>
        <input type="file" accept="image/*" onchange="onFeedbackPhoto(${index}, this)">
      </label>
      <button type="button" class="btn-feedback-submit" id="fbsubmit_${index}"
        onclick="submitFeedback(${index}, '${visit.id}')">إرسال التقييم</button>
    </div>
  </div>`;
}

function toggleFeedback(index) {
  var sec = document.getElementById('fb_' + index);
  if (sec) sec.classList.toggle('fb-open');
}

var _fbRatings = {};   // { index: { cat: val } }
var _fbPhotos  = {};   // { index: { base64, mime } }

function rateStar(el) {
  var idx = el.dataset.idx;
  var cat = el.dataset.cat;
  var val = parseInt(el.dataset.val, 10);
  if (!_fbRatings[idx]) _fbRatings[idx] = {};
  _fbRatings[idx][cat] = val;

  var container = document.getElementById('stars_' + idx + '_' + cat);
  if (!container) return;
  var stars = container.querySelectorAll('.star');
  stars.forEach(function(s, i) {
    s.classList.toggle('lit', i < val);
  });
}

function onFeedbackPhoto(index, input) {
  var file = input.files[0];
  if (!file) return;
  var label = document.getElementById('fblabel_' + index);
  var preview = document.getElementById('fbphoto_preview_' + index);

  var canvas = document.createElement('canvas');
  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    var MAX = 1200;
    var w = img.width, h = img.height;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    canvas.toBlob(function(blob) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var b64 = e.target.result.split(',')[1];
        _fbPhotos[index] = { base64: b64, mime: 'image/webp' };
        preview.innerHTML = '<img src="' + e.target.result + '" alt=""> صورة مختارة ✓';
        if (label) label.classList.add('has-photo');
      };
      reader.readAsDataURL(blob);
    }, 'image/webp', 0.82);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

async function submitFeedback(index, visitId) {
  var ratings = _fbRatings[index] || {};

  // require at least overall rating
  if (!ratings.overall) {
    var row = document.getElementById('stars_' + index + '_overall');
    if (row) { row.style.outline = '2px solid #e53935'; row.style.borderRadius = '4px'; }
    setTimeout(function() { if (row) row.style.outline = ''; }, 1800);
    return;
  }

  var btn = document.getElementById('fbsubmit_' + index);
  if (btn) { btn.disabled = true; btn.textContent = 'جارٍ الإرسال…'; }

  var comment = (document.getElementById('fbcomment_' + index) || {}).value || '';
  var photo   = _fbPhotos[index] || {};

  try {
    var body = { visit_id: visitId, ratings: ratings, comment: comment };
    if (photo.base64) { body.photoBase64 = photo.base64; body.photoMime = photo.mime; }

    var res = await fetch('/api/feedback', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    });

    if (!res.ok) throw new Error('server error');

    localStorage.setItem('fb_done_' + visitId, '1');

    var sec = document.getElementById('fb_' + index);
    if (sec) sec.outerHTML = `<div class="feedback-section">
      <div class="feedback-done">
        <div class="feedback-done-icon">✅</div>
        <p>شكراً على تقييمك!</p>
        <small>تقييمك يساعدنا على تحسين خدمتنا</small>
      </div>
    </div>`;
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'إرسال التقييم'; }
    alert('حدث خطأ، يرجى المحاولة مجدداً');
  }
}

function toggleCard(index) {
  const card = document.getElementById('vc-' + index);
  card.classList.toggle('open');
}

/* ── Filter logic ──────────────────────── */
var _allVisits = [];
var _activeFilter = 'all';

function visitYearMonth(visit) {
  const d = new Date(visit.startTime || visit.submissionDate);
  if (isNaN(d)) return null;
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function buildFilterBar(visits) {
  const bar = document.getElementById('filter-bar');
  if (!bar) return;

  // Collect unique year-months in order
  const seen = new Set();
  const months = [];
  visits.forEach(function(v) {
    const ym = visitYearMonth(v);
    if (ym && !seen.has(ym)) { seen.add(ym); months.push(ym); }
  });

  if (months.length <= 1) { bar.style.display = 'none'; return; }

  let html = `<button class="filter-pill active" onclick="applyFilter('all')">الكل (${visits.length})</button>`;
  months.forEach(function(ym) {
    const count = visits.filter(function(v) { return visitYearMonth(v) === ym; }).length;
    const [y, m] = ym.split('-');
    const label = new Date(+y, +m - 1, 1).toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });
    html += `<button class="filter-pill" data-ym="${ym}" onclick="applyFilter('${ym}')">${label} (${count})</button>`;
  });
  bar.innerHTML = html;
}

function applyFilter(ym) {
  _activeFilter = ym;

  // Update pill states
  document.querySelectorAll('.filter-pill').forEach(function(p) {
    p.classList.toggle('active',
      ym === 'all' ? p.getAttribute('onclick') === "applyFilter('all')" : p.getAttribute('data-ym') === ym
    );
  });

  const filtered = ym === 'all'
    ? _allVisits
    : _allVisits.filter(function(v) { return visitYearMonth(v) === ym; });

  renderVisitList(filtered);
}

function renderVisitList(visits) {
  const list = document.getElementById('visits-list');
  if (!visits.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🌱</div><p>لا توجد تقارير في هذه الفترة</p></div>';
    return;
  }
  list.innerHTML = visits.map(function(v, i) { return buildVisitCard(v, i); }).join('');
  const first = document.getElementById('vc-0');
  if (first) first.classList.add('open');
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox-close').onclick = () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
};
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('open');
    document.getElementById('lightbox-img').src = '';
  }
});

/* ── Main ──────────────────────── */
async function init() {
  const dealId = getDealId();
  if (!dealId) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    document.getElementById('error-msg').textContent = 'الرابط غير صحيح — يرجى استخدام الرابط المرسل إليك';
    return;
  }

  try {
    const res = await fetch(`/api/portal?deal_id=${encodeURIComponent(dealId)}`);
    if (!res.ok) throw new Error('Deal not found');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    render(data);
  } catch (e) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
    document.getElementById('error-msg').textContent = e.message || 'خطأ في تحميل البيانات';
  }
}

function render(data) {
  const { deal, visits, totalVisits, lastVisit } = data;

  // Header
  document.title = `Shatla Care — ${deal.name}`;
  document.getElementById('deal-name').textContent = deal.name;

  const meta = document.getElementById('deal-meta');
  if (deal.pipeline) meta.innerHTML += `<span class="deal-badge">🏷 ${deal.pipeline}</span>`;
  if (deal.stage)    meta.innerHTML += `<span class="deal-badge">📌 ${deal.stage}</span>`;
  if (deal.region)   meta.innerHTML += `<span class="deal-badge">📍 ${deal.region}</span>`;

  const contact = document.getElementById('deal-contact');
  if (deal.phone)   contact.innerHTML += `<div class="contact-item">📞 ${deal.phone}</div>`;
  if (deal.address) contact.innerHTML += `<div class="contact-item">🏠 ${deal.address}</div>`;

  // Stats
  document.getElementById('stat-visits').textContent = totalVisits;
  document.getElementById('stat-last').textContent = lastVisit ? formatDateShort(lastVisit) : '—';
  const totalPhotos = visits.reduce((s, v) => s + (v.photoCount || 0), 0);
  document.getElementById('stat-photos').textContent = totalPhotos || '—';

  // Visits
  _allVisits = visits;
  buildFilterBar(visits);
  if (!visits.length) {
    document.getElementById('visits-list').innerHTML =
      `<div class="empty"><div class="empty-icon">🌱</div><p>لا توجد تقارير متاحة بعد</p></div>`;
  } else {
    renderVisitList(visits);
  }

  // Show app
  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

/* Run init — retry once on hashchange in case hash isn't ready yet */
var _initDone = false;
async function safeInit() {
  if (_initDone) return;
  const id = getDealId();
  if (!id) return;          // no deal_id yet — wait
  _initDone = true;
  init();
}

window.addEventListener('hashchange', safeInit);
document.addEventListener('DOMContentLoaded', safeInit);

/* Fallback: if DOMContentLoaded already fired */
if (document.readyState !== 'loading') safeInit();
</script>
